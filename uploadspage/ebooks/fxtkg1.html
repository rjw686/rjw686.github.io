    <center><h1><b>《飞向太空港》  李鸣生/著</b></h1></center>
   <center><img src="/uploadspage/ebooks/sources/飞向太空港.png" alt="书籍封面" title="书籍封面"></center>
   <center><i>
    <pre>
    《飞向太空港》是一部由李鸣生所著的连载于网络的人文社科类小说。
    《飞向太空港》一书记录了中国西昌卫星发射中心以“长征三号”运载火箭成功发射外国卫星——美国“亚洲一号”的故事，
    其中既有中美专家在大凉山深处的合作与友情，也有东西方文明在现代卫星发射场上交汇时的碰撞与冲突。
    整部作品节奏紧凑、张弛有度，以全景式的书写完整再现了中国自主研发的运载火箭首次成功发射外国卫星的全过程，
    展现了中华民族勇于进取、不断攻坚克难的智慧与决心，也以地球人的眼光和气魄俯仰天地、穿越古今，展现出人类探索宇宙、憧憬未来的博大胸襟。
    </pre>
    </i></center>
